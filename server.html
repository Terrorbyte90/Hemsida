<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server — Ted Svärd</title>
  <meta http-equiv="refresh" content="0; url=https://82.165.169.52.nip.io/server/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--font-body:'Inter',system-ui,sans-serif;--font-display:'Instrument Serif',Georgia,serif;--font-mono:'JetBrains Mono','SF Mono',monospace;--gold:#f5c842;--gold-dim:rgba(245,200,66,0.12);--gold-border:rgba(245,200,66,0.35);--transition:180ms cubic-bezier(0.16,1,0.3,1)}
    [data-theme="dark"],:root{--bg:#0a0a09;--surface:#141413;--border:rgba(255,255,255,0.07);--text:#eceae6;--text-muted:#8a8882;--text-faint:#555350;--accent:#5b9cf6}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;height:100%}
    body{font-family:var(--font-body);color:var(--text);background:var(--bg);min-height:100dvh;display:grid;place-items:center;padding:1rem;position:relative;overflow:hidden}
    body::before{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-60%);width:600px;height:600px;background:radial-gradient(ellipse at center,rgba(245,200,66,0.06) 0%,transparent 70%);pointer-events:none}
    .card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--gold-border);border-radius:1.25rem;padding:2.5rem;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.7),0 0 80px rgba(245,200,66,0.06)}
    .icon{width:52px;height:52px;border-radius:1rem;background:var(--gold-dim);border:1px solid rgba(245,200,66,0.25);display:grid;place-items:center;font-size:1.5rem;margin:0 auto 1.25rem;box-shadow:0 0 24px rgba(245,200,66,0.1)}
    h1{font-family:var(--font-display);font-size:1.6rem;font-weight:400;letter-spacing:-.02em;margin-bottom:.5rem}
    h1 em{font-style:italic;color:var(--gold)}
    p{font-size:.875rem;color:var(--text-muted);margin-bottom:1.75rem;line-height:1.5}
    .btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--gold);color:#0a0a09;font-weight:600;font-size:.95rem;padding:.8rem 1.75rem;border-radius:.625rem;text-decoration:none;transition:all var(--transition)}
    .btn:hover{background:#f0c020;box-shadow:0 0 24px rgba(245,200,66,0.3);transform:translateY(-1px)}
    .note{margin-top:1.5rem;font-size:.75rem;color:var(--text-faint);font-family:var(--font-mono)}
    .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ade80;margin-right:.4rem;vertical-align:middle;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⬡</div>
    <h1>Hermes <em>Server</em></h1>
    <p>Privat infrastruktur. Du vidarebefordras automatiskt till inloggningssidan.</p>
    <a href="https://82.165.169.52.nip.io/server/" class="btn">Gå till inloggning →</a>
    <div class="note"><span class="dot"></span>82.165.169.52 · HTTPS</div>
  </div>
  <script>window.location.replace("https://82.165.169.52.nip.io/server/");</script>
</body>
</html>
