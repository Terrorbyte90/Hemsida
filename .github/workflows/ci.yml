name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check HTML files exist
        run: |
          echo "HTML files:"
          find . -name "*.html" | head -20
          echo "All good!"
