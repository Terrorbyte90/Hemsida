<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ted Svärd – AI Architect &amp; Systeminnovatör. Jag befinner mig i framtiden. Gör du?" />
  <title>Ted Svärd – AI Architect</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon: #a855f7;
      --neon2: #06b6d4;
      --red: #ef4444;
      --green: #22c55e;
      --yellow: #f59e0b;
      --mono: 'JetBrains Mono', monospace;
      --bg-primary: #07070d;
    }

    /* ── TICKER ── */
    .ticker-wrap {
      background: rgba(168,85,247,0.05);
      border-bottom: 1px solid rgba(168,85,247,0.12);
      padding: 9px 0;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
      margin-top: 64px;
    }
    .ticker-wrap::before,.ticker-wrap::after{
      content:'';position:absolute;top:0;bottom:0;width:100px;z-index:2;pointer-events:none;
    }
    .ticker-wrap::before{left:0;background:linear-gradient(to right,#07070d,transparent);}
    .ticker-wrap::after{right:0;background:linear-gradient(to left,#07070d,transparent);}
    .ticker-inner{display:inline-flex;gap:56px;animation:ticker-scroll 44s linear infinite;}
    .ticker-item{
      font-family:var(--mono);font-size:0.7rem;
      color:rgba(148,163,184,0.7);
      display:inline-flex;align-items:center;gap:8px;
      letter-spacing:0.02em;
    }
    .t-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
    .t-dot-p{background:var(--neon);}
    .t-dot-r{background:var(--red);}
    .t-dot-g{background:var(--green);}
    .t-dot-y{background:var(--yellow);}
    @keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

    /* ── HERO ── */
    .hero-v3{
      min-height: 92vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 60px;
      text-align: center;
      position: relative;
    }
    .hero-v3::before{
      content:'';
      position:absolute;inset:0;
      background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(168,85,247,0.07),transparent 70%);
      pointer-events:none;
    }
    .hero-badge{
      display:inline-flex;align-items:center;gap:8px;
      font-family:var(--mono);font-size:0.72rem;
      color:rgba(168,85,247,0.9);
      letter-spacing:0.12em;text-transform:uppercase;
      margin-bottom:28px;
      padding:7px 16px;
      background:rgba(168,85,247,0.07);
      border:1px solid rgba(168,85,247,0.2);
      border-radius:50px;
    }
    .hero-badge .pdot{
      width:7px;height:7px;background:var(--green);
      border-radius:50%;animation:pg 2s infinite;
    }
    @keyframes pg{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)}50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}
    .hero-h1{
      font-family:'Space Grotesk',sans-serif;
      font-size:clamp(2.8rem,6vw,5rem);
      font-weight:700;line-height:1.08;
      color:#fff;
      letter-spacing:-0.02em;
      max-width:800px;
    }
    .hero-h1 .dim{
      display:block;
      font-size:clamp(1.3rem,2.4vw,1.9rem);
      font-weight:400;
      color:rgba(148,163,184,0.7);
      letter-spacing:0;
      margin-top:10px;
    }
    .hero-lead{
      margin:28px auto 0;
      max-width:560px;
      font-size:1rem;
      color:rgba(148,163,184,0.8);
      line-height:1.8;
    }
    .hero-ctas{
      display:flex;gap:12px;flex-wrap:wrap;
      justify-content:center;margin-top:36px;
    }

    /* ── TERMINAL ── */
    .terminal-section{
      width:100%;max-width:800px;
      margin:64px auto 0;
      padding:0 24px;
    }
    .terminal-label{
      font-family:var(--mono);font-size:0.65rem;
      color:rgba(168,85,247,0.6);
      letter-spacing:0.15em;text-transform:uppercase;
      text-align:center;margin-bottom:12px;
    }
    .terminal-window{
      background:#08080f;
      border:1px solid rgba(168,85,247,0.2);
      border-radius:14px;
      overflow:hidden;
      box-shadow:
        0 0 0 1px rgba(168,85,247,0.05),
        0 20px 60px rgba(0,0,0,0.7),
        0 0 80px rgba(168,85,247,0.06);
    }
    .terminal-bar{
      display:flex;align-items:center;
      justify-content:space-between;
      padding:13px 18px;
      background:rgba(255,255,255,0.025);
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .t-dots{display:flex;gap:6px;}
    .t-dot-btn{width:12px;height:12px;border-radius:50%;}
    .t-dot-btn-r{background:#ff5f57;}
    .t-dot-btn-y{background:#febc2e;}
    .t-dot-btn-g{background:#28c840;}
    .t-bar-title{
      font-family:var(--mono);font-size:0.68rem;
      color:rgba(148,163,184,0.5);
      letter-spacing:0.04em;
    }
    .t-model-badge{
      font-family:var(--mono);font-size:0.62rem;
      padding:4px 12px;
      background:rgba(168,85,247,0.1);
      border:1px solid rgba(168,85,247,0.2);
      border-radius:50px;
      color:var(--neon);
      transition:all 0.4s;
    }
    .t-model-badge.danger{
      color:var(--red);
      background:rgba(239,68,68,0.08);
      border-color:rgba(239,68,68,0.25);
    }
    .terminal-body{
      padding:24px;
      min-height:400px;max-height:400px;
      overflow:hidden;
      position:relative;
      font-family:var(--mono);
      font-size:0.8rem;
      line-height:1.75;
    }
    .terminal-body.blur-fx{filter:blur(4px) brightness(0.6);transition:filter 0.7s;}

    .hack-veil{
      position:absolute;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:14px;
      opacity:0;pointer-events:none;
      transition:opacity 0.5s;
      z-index:20;
    }
    .hack-veil.show{opacity:1;}
    .hack-title{
      font-family:var(--mono);font-size:1rem;font-weight:700;
      color:var(--red);
      text-shadow:0 0 24px rgba(239,68,68,0.9);
      animation:flk 0.12s infinite alternate;
      text-align:center;
    }
    .hack-sub-text{font-family:var(--mono);font-size:0.68rem;color:rgba(239,68,68,0.6);text-align:center;}
    .scan-line{width:92%;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);animation:scan 0.18s infinite;}
    @keyframes flk{0%{opacity:1}100%{opacity:0.65}}
    @keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

    .t-msg{margin-bottom:16px;opacity:0;transform:translateY(8px);transition:opacity 0.35s,transform 0.35s;}
    .t-msg.in{opacity:1;transform:translateY(0);}
    .t-row{display:flex;align-items:flex-start;gap:10px;}
    .t-av{
      width:28px;height:28px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:0.6rem;font-weight:700;flex-shrink:0;margin-top:1px;
    }
    .t-av-u{background:linear-gradient(135deg,#4f46e5,#6d28d9);color:#e0e7ff;}
    .t-av-a{background:linear-gradient(135deg,#a855f7,#06b6d4);color:#fff;}
    .t-bubble{
      padding:10px 14px;font-size:0.78rem;
      max-width:86%;border-radius:10px;
    }
    .t-bubble-u{
      background:rgba(79,70,229,0.1);
      border:1px solid rgba(79,70,229,0.2);
      color:#c7d2fe;
      border-radius:10px 10px 10px 2px;
    }
    .t-bubble-a{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.07);
      color:#e2e8f0;
      border-radius:10px 10px 2px 10px;
    }
    .t-code{
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(168,85,247,0.12);
      border-radius:7px;
      padding:10px 14px;
      margin-top:8px;
      font-family:var(--mono);
      font-size:0.68rem;
      color:#7dd3fc;
      white-space:pre;
      max-height:0;overflow:hidden;
      transition:max-height 0.9s ease;
    }
    .t-code.open{max-height:260px;}
    .t-result{
      margin-top:8px;padding:10px 14px;
      border-radius:7px;
      font-size:0.73rem;
    }
    .t-result-ok{background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.18);color:#86efac;}
    .t-result-err{background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.18);color:#fca5a5;}
    .t-typing{display:flex;gap:4px;align-items:center;padding:3px 0;}
    .t-typing span{width:5px;height:5px;border-radius:50%;background:var(--neon);animation:tb 1.2s infinite;}
    .t-typing span:nth-child(2){animation-delay:.2s;}
    .t-typing span:nth-child(3){animation-delay:.4s;}
    @keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

    .sec-qs{
      display:flex;flex-direction:column;gap:8px;
      margin-top:12px;opacity:0;transition:opacity 0.7s;
    }
    .sec-q{
      display:flex;align-items:center;gap:10px;
      padding:10px 16px;border-radius:8px;
      font-family:var(--mono);font-size:0.75rem;
    }
    .sec-q-red{background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.18);color:#fca5a5;}
    .sec-q-purple{background:rgba(168,85,247,0.05);border:1px solid rgba(168,85,247,0.18);color:#d8b4fe;}
    .sec-q-purple a{color:inherit;text-decoration:none;}
    .sec-q-purple a:hover{text-decoration:underline;}

    /* ── STATS ── */
    .hero-stats-row{
      display:grid;grid-template-columns:repeat(3,1fr);
      gap:24px;margin:56px auto 0;
      max-width:640px;width:100%;
      padding-top:28px;
      border-top:1px solid rgba(255,255,255,0.06);
    }
    .hs{text-align:center;}
    .hs-val{
      font-family:'Space Grotesk',sans-serif;
      font-size:2rem;font-weight:700;
      background:linear-gradient(135deg,var(--neon),var(--neon2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .hs-label{font-size:0.72rem;color:rgba(148,163,184,0.6);margin-top:4px;line-height:1.4;}

    /* ── FACTS ── */
    .facts-section{
      padding:80px 0;
      background:rgba(0,0,0,0.35);
      border-top:1px solid rgba(255,255,255,0.04);
      border-bottom:1px solid rgba(255,255,255,0.04);
    }
    .facts-inner{max-width:1200px;margin:0 auto;padding:0 32px;}
    .facts-header{text-align:center;margin-bottom:56px;}
    .facts-header h2{
      font-family:'Space Grotesk',sans-serif;
      font-size:clamp(1.8rem,3vw,2.6rem);
      font-weight:700;color:#fff;margin-bottom:14px;
    }
    .facts-header p{color:rgba(148,163,184,0.7);max-width:500px;margin:0 auto;font-size:0.95rem;line-height:1.7;}
    .facts-grid{
      display:grid;grid-template-columns:repeat(3,1fr);
      gap:18px;margin-bottom:36px;
    }
    .fact-c{
      background:rgba(255,255,255,0.02);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:14px;padding:26px 22px;
      transition:border-color 0.3s,transform 0.3s;
      position:relative;overflow:hidden;
    }
    .fact-c::after{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,var(--neon),var(--neon2));
      opacity:0;transition:opacity 0.3s;
    }
    .fact-c:hover{border-color:rgba(168,85,247,0.2);transform:translateY(-3px);}
    .fact-c:hover::after{opacity:1;}
    .fact-n{
      font-family:'Space Grotesk',sans-serif;font-size:2.1rem;font-weight:700;
      background:linear-gradient(135deg,var(--neon),var(--neon2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      line-height:1;margin-bottom:7px;
    }
    .fact-t{font-size:0.82rem;color:#fff;font-weight:600;margin-bottom:6px;}
    .fact-d{font-size:0.75rem;color:rgba(148,163,184,0.6);line-height:1.6;}
    .warn-strip{
      background:linear-gradient(135deg,rgba(239,68,68,0.07),rgba(168,85,247,0.04));
      border:1px solid rgba(239,68,68,0.18);
      border-radius:14px;padding:24px 32px;
      display:flex;align-items:center;gap:18px;
    }
    .warn-strip-icon{font-size:1.8rem;flex-shrink:0;}
    .warn-strip h3{color:#fca5a5;font-size:0.95rem;font-weight:600;margin-bottom:4px;font-family:'Space Grotesk',sans-serif;}
    .warn-strip p{color:rgba(148,163,184,0.6);font-size:0.8rem;line-height:1.6;margin:0;}

    /* ── URGENCY ── */
    .urgency-sec{padding:96px 0;}
    .urgency-in{max-width:1200px;margin:0 auto;padding:0 32px;}
    .urgency-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;}
    .urg-left h2{
      font-family:'Space Grotesk',sans-serif;
      font-size:clamp(1.8rem,3vw,2.5rem);font-weight:700;
      color:#fff;line-height:1.2;margin-bottom:18px;
    }
    .urg-left h2 .danger{color:var(--red);}
    .urg-left p{color:rgba(148,163,184,0.7);font-size:0.92rem;line-height:1.85;margin-bottom:14px;}
    .uq-list{display:flex;flex-direction:column;gap:10px;margin-top:24px;}
    .uq{
      display:flex;align-items:center;gap:12px;
      padding:13px 17px;
      background:rgba(255,255,255,0.025);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:9px;
      font-size:0.85rem;color:#fff;font-weight:500;
    }
    .uq-ico{font-size:1rem;}
    .tl-item{display:flex;gap:16px;align-items:flex-start;margin-bottom:22px;position:relative;}
    .tl-item::before{
      content:'';position:absolute;left:19px;top:36px;
      width:2px;height:calc(100% + 6px);
      background:linear-gradient(to bottom,rgba(168,85,247,0.35),transparent);
    }
    .tl-item:last-child::before{display:none;}
    .tl-icon{
      width:40px;height:40px;border-radius:50%;
      background:rgba(168,85,247,0.1);
      border:1px solid rgba(168,85,247,0.25);
      display:flex;align-items:center;justify-content:center;
      font-size:0.95rem;flex-shrink:0;
    }
    .tl-body h4{font-family:'Space Grotesk',sans-serif;font-size:0.88rem;font-weight:600;color:#fff;margin-bottom:3px;}
    .tl-body p{font-size:0.76rem;color:rgba(148,163,184,0.6);line-height:1.6;margin:0;}
    .tl-date{font-family:var(--mono);font-size:0.62rem;color:var(--neon);margin-bottom:3px;}

    /* ── SERVICES ── */
    .services-sec{padding:80px 0;background:rgba(0,0,0,0.2);}
    .services-in{max-width:1200px;margin:0 auto;padding:0 32px;}
    .services-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:44px;}
    .svc-card{
      background:rgba(255,255,255,0.025);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:14px;padding:22px 18px;
      transition:all 0.3s;text-decoration:none;display:block;
    }
    .svc-card:hover{
      border-color:rgba(168,85,247,0.25);
      background:rgba(168,85,247,0.04);
      transform:translateY(-4px);
    }
    .svc-icon{font-size:1.7rem;margin-bottom:12px;}
    .svc-title{font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:700;color:#fff;margin-bottom:6px;}
    .svc-desc{font-size:0.75rem;color:rgba(148,163,184,0.6);line-height:1.6;}

    /* ── CTA BOTTOM ── */
    .cta-bottom-sec{
      padding:100px 0;text-align:center;
      position:relative;overflow:hidden;
    }
    .cta-bottom-sec::before{
      content:'';position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:500px;height:500px;
      background:radial-gradient(circle,rgba(168,85,247,0.07),transparent 70%);
      pointer-events:none;
    }
    .cta-bottom-in{max-width:640px;margin:0 auto;padding:0 32px;position:relative;z-index:2;}
    .cta-bottom-in h2{
      font-family:'Space Grotesk',sans-serif;
      font-size:clamp(2rem,4vw,3rem);
      font-weight:700;color:#fff;line-height:1.2;margin-bottom:18px;
    }
    .cta-bottom-in h2 .g{
      background:linear-gradient(135deg,var(--neon),var(--neon2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .cta-bottom-in p{color:rgba(148,163,184,0.7);font-size:0.95rem;line-height:1.75;margin-bottom:32px;}

    /* ── RESPONSIVE ── */
    @media(max-width:768px){
      .facts-grid{grid-template-columns:repeat(2,1fr);}
      .urgency-grid{grid-template-columns:1fr;}
      .services-grid{grid-template-columns:repeat(2,1fr);}
      .terminal-section{padding:0 16px;}
    }
    @media(max-width:480px){
      .facts-grid{grid-template-columns:1fr;}
      .services-grid{grid-template-columns:1fr;}
      .hero-stats-row{gap:12px;}
      .hs-val{font-size:1.5rem;}
    }
  </style>
</head>
